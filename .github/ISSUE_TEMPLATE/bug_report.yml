name: Bug Report
description: Report a bug or crash in NEXTVM
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.

  - type: input
    id: device
    attributes:
      label: Device Information
      description: "Device model and Android version"
      placeholder: "Samsung Galaxy S24, Android 15"
    validations:
      required: true

  - type: input
    id: app
    attributes:
      label: App Being Virtualized
      description: "Package name (or app name) and version"
      placeholder: "com.whatsapp v2.24.x or WhatsApp"
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "Clear steps to reproduce the issue"
      placeholder: |
        1. Open NEXTVM
        2. Install WhatsApp APK
        3. Launch WhatsApp
        4. App crashes on login screen
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What should happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: "What actually happens?"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logcat Output
      description: "Relevant logcat output (filter: com.nextvm)"
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: "If applicable, add screenshots"
