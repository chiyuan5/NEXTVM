name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for NEXTVM? We'd love to hear it!

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: "Clear description of the feature you'd like"
      placeholder: "I'd like NEXTVM to support..."
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: Use Case
      description: "Why would this feature be useful? What problem does it solve?"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Privacy & Security
        - App Compatibility
        - Performance
        - UI/UX
        - Developer Tools
        - Automation
        - Other
    validations:
      required: true

  - type: textarea
    id: implementation
    attributes:
      label: Possible Implementation
      description: "If you have ideas about how this could be implemented, share them here"

  - type: checkboxes
    id: willing
    attributes:
      label: Contribution
      options:
        - label: I'm willing to work on implementing this feature
